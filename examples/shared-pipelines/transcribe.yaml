# Transcription Pipeline
# Audio/Video → Whisper STT → Text output
# Runs locally with configurable model size (using Candle ML)

version: "v1"
metadata:
  name: "transcribe"
  description: "Audio transcription using Whisper (Candle)"
  category: "asr"

nodes:
  - id: stt
    node_type: candle-whisper
    params:
      model: "tiny"
      language: "en"
      task: "transcribe"

connections: []
