[package]
name = "tts-dataset-gen"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Generate diverse TTS audio datasets for wake-word model training"
license.workspace = true

[[bin]]
name = "tts-dataset-gen"
path = "src/main.rs"

[dependencies]
# Reuse CLI library (includes I/O, audio parsing, pipeline execution)
remotemedia-cli = { path = "../remotemedia-cli" }

# SDK core
remotemedia-core = { workspace = true }

# CLI framework
clap = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Audio I/O
hound = { workspace = true }

# Python node registration (must be linked for inventory to discover nodes)
remotemedia-python-nodes = { path = "../../../crates/python-nodes" }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
