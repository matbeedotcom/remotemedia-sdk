[package]
name = "remotemedia-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Command-line interface for RemoteMedia SDK pipeline execution"
license.workspace = true

[lib]
name = "remotemedia_cli"
path = "src/lib.rs"

[[bin]]
name = "remotemedia"
path = "src/main.rs"

[dependencies]
# SDK dependencies
remotemedia-core = { workspace = true, features = ["video"] }
remotemedia-candle-nodes = { path = "../../../crates/candle-nodes", features = ["whisper", "vad"], optional = true }
remotemedia-python-nodes = { path = "../../../crates/python-nodes", optional = true }

# Transport crates (optional, feature-gated)
remotemedia-grpc = { workspace = true, features = ["cli"], optional = true }
remotemedia-http = { workspace = true, features = ["cli"], optional = true }
remotemedia-webrtc = { workspace = true, features = ["cli", "grpc-signaling", "ws-signaling"], optional = true }
remotemedia-ui = { workspace = true, optional = true }

# FFmpeg for decoding any media format
ac-ffmpeg = "0.19"

# CLI framework
clap = { workspace = true }

# Audio I/O
cpal = { workspace = true }

# Progress and output
indicatif = { workspace = true }
console = { workspace = true }
comfy-table = { workspace = true }

# Async runtime
tokio = { workspace = true }
tokio-stream = { workspace = true }
futures = { workspace = true }
# async-trait for NodeExecutor trait implementation
async-trait = "0.1"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Utilities
uuid = { workspace = true }
directories = { workspace = true }
url = { workspace = true }

# Use vendored OpenSSL to avoid system header version mismatch
openssl = { version = "0.10", features = ["vendored"] }

[features]
default = ["grpc", "python-nodes"]
candle = ["dep:remotemedia-candle-nodes"]
python-nodes = ["dep:remotemedia-python-nodes"]
grpc = ["dep:remotemedia-grpc"]
http = ["dep:remotemedia-http"]
webrtc = ["dep:remotemedia-webrtc"]
ui = ["dep:remotemedia-ui"]
speaker-diarization = ["remotemedia-core/speaker-diarization"]

[dev-dependencies]
tempfile = "3.8"
assert_cmd = "2.0"
predicates = "3.0"
