# Kokoro TTS Pipeline
# Input: Text
# Output: Audio (WAV)
#
# Flow: Text → KokoroTTS → Audio

version: v1
metadata:
  name: tts-kokoro
  description: Text-to-speech synthesis using Kokoro

nodes:
  - id: kokoro
    nodeType: KokoroTTSNode
    isStreaming: true
    params:
      voice: af_bella
      speed: 1.0
      sample_rate: 24000
    python_deps:
      - "kokoro>=0.9.4"
      - soundfile

connections: []
