# Whisper Transcription Pipeline
# Input: Audio (WAV, MP3, etc.)
# Output: Text (transcription)
#
# Flow: AudioChunker → Resample(16kHz) → VAD → Buffer → Whisper

version: v1
metadata:
  name: whisper-transcribe
  description: Audio transcription using Whisper with VAD-based buffering

nodes:
  - id: input
    nodeType: AudioChunkerNode
    isStreaming: true
    params:
      chunkSize: 1024

  - id: resampler
    nodeType: FastResampleNode
    isStreaming: true
    params:
      targetSampleRate: 16000

  - id: vad
    nodeType: SileroVADNode
    isStreaming: true
    params:
      threshold: 0.5

  - id: buffer
    nodeType: AudioBufferAccumulatorNode
    isStreaming: true
    params:
      minUtteranceDurationMs: 500
      maxUtteranceDurationMs: 30000

  - id: whisper
    nodeType: candle-whisper
    isStreaming: true
    params:
      model: tiny
      language: en
      task: transcribe
      device: cpu

connections:
  - from: input
    to: resampler
  - from: resampler
    to: vad
  - from: vad
    to: buffer
  - from: buffer
    to: whisper
