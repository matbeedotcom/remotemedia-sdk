# Whisper Transcription Pipeline
# Input: Audio (WAV, MP3, etc.)
# Output: Text (transcription)

version: v1
metadata:
  name: whisper-transcribe
  description: Audio transcription using Whisper

nodes:
  - id: input
    nodeType: AudioChunkerNode
    isStreaming: true
    params:
      chunkSize: 1024

  - id: resampler
    nodeType: FastResampleNode
    isStreaming: true
    params:
      targetSampleRate: 16000

  - id: whisper
    nodeType: WhisperXNode
    isStreaming: true
    params:
      model: base.en
      language: en
      task: transcribe
      beamSize: 5

connections:
  - from: input
    to: resampler
  - from: resampler
    to: whisper
