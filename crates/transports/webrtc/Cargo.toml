[package]
name = "remotemedia-webrtc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "WebRTC transport for RemoteMedia pipelines with multi-peer mesh networking"
license.workspace = true
repository.workspace = true

[lib]
name = "remotemedia_webrtc"
crate-type = ["rlib"]

[dependencies]
# Core runtime (with default features: multiprocess, silero-vad, docker).
# `bundled-uv` enables the uv binary downloader so managed venvs can
# provision their own Python 3.12 regardless of what's on PATH — needed
# by the mlx-vlm / mlx-audio demo servers where the system interpreter
# (e.g. miniconda 3.10) is too old to host the wheels.
remotemedia-core = { path = "../../core", default-features = true, features = ["bundled-uv"] }

# WebRTC peer connections, ICE, DTLS, SRTP
webrtc = "0.14.0"

# WebSocket signaling client
tokio-tungstenite = "0.21"

# Audio codec - pure Rust implementation via unsafe-libopus (always enabled for WebRTC)
opus = { git = "https://github.com/DCNick3/opus-rs.git", branch = "unsafe-libopus", default-features = false, features = ["unsafe-libopus-backend"] }

# Video codecs (optional until Phase 3 - requires native libs)
media-codec-vpx = { version = "0.5", optional = true }
openh264 = { version = "0.5", optional = true }

# UUID generation for session/peer IDs
uuid = { version = "1.6", features = ["v4", "serde"] }

# Async runtime
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
futures-util = "0.3"

# Sync locks for media track state (encoder / decoder / sender / RTP
# counters). Phase B2: swapped from `tokio::sync::RwLock` because no
# `.await` is held across the lock; uncontended fast path is a CAS.
parking_lot = { workspace = true }

# Serialization (JSON-RPC 2.0)
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
base64 = "0.22"

# Data types
bytes = "1.5"

# Async trait support
async-trait = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# gRPC signaling (optional)
tonic = { workspace = true, optional = true }
tonic-web = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }
tower = { workspace = true, optional = true }
tower-http = { version = "0.6", features = ["cors"], optional = true }
http = { version = "1.0", optional = true }

# CLI argument parsing (optional)
clap = { version = "4.5", features = ["derive", "env"], optional = true }

# Docker execution
bollard = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"
tracing-subscriber = { workspace = true }
reqwest = { workspace = true }
tokio-tungstenite = "0.21"

# Pull Python node factories (LFM2AudioNode, WhisperSTTNode, …) into
# the default streaming registry for example binaries. They register
# themselves via `inventory::submit!` so the crate just needs to be
# linked in — the `_python_nodes_link` alias in the example forces that.
remotemedia-python-nodes = { path = "../../python-nodes" }

# Enable grpc-signaling for E2E tests
remotemedia-webrtc = { path = ".", features = ["grpc-signaling"] }

[[example]]
name = "lfm2_audio_webrtc_server"
required-features = ["ws-signaling"]

[[example]]
name = "qwen_s2s_webrtc_server"
required-features = ["ws-signaling"]

[[example]]
name = "webrtc_test_server"
required-features = ["ws-signaling"]

[build-dependencies]
tonic-prost-build = { workspace = true }
protobuf-src = { workspace = true }

[features]
default = []
codecs = ["dep:media-codec-vpx"]
h264 = ["dep:openh264"]
# Generic signaling feature for event bridge types (WebRtcEventBridge, etc.)
signaling = ["ws-signaling"]
# WebSocket signaling requires grpc-signaling because ServerPeer uses generated protobufs
ws-signaling = ["grpc-signaling"]
grpc-signaling = [
    "dep:tonic",
    "dep:tonic-web",
    "dep:tonic-prost",
    "dep:prost",
    "dep:tokio-stream",
    "dep:tower",
    "dep:tower-http",
    "dep:http",
]
cli = ["dep:clap"]
full = ["codecs", "h264", "grpc-signaling", "ws-signaling"]
