[package]
name = "remotemedia-webrtc-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "WebRTC server binary for RemoteMedia real-time media streaming"
license.workspace = true
repository.workspace = true

[[bin]]
name = "webrtc-server"
path = "src/main.rs"

[dependencies]
# Transport library (with gRPC signaling for server mode)
remotemedia-webrtc = { path = "../../transports/webrtc", features = ["grpc-signaling"] }

# Async runtime
tokio = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# CLI argument parsing
clap = { version = "4.5", features = ["derive", "env"] }

# Server utilities
num_cpus = { workspace = true }
